<section class="login-page">
  <div class="login-card modern-card p-4 p-md-5">
    <div class="text-center mb-4">
      <h3 class="mb-1 section-title">Smart Village Dashboard</h3>
      <p class="text-muted-custom mb-0">Sign in to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="name@example.com" />
        <small class="text-danger" *ngIf="loginForm.controls.email.touched && loginForm.controls.email.invalid">
          Enter a valid email address.
        </small>
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="Enter password" />
        <small class="text-danger" *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
          Password must be at least 6 characters.
        </small>
      </div>

      <div class="text-end mb-3">
        <a href="javascript:void(0)" class="forgot-link">Forgot password?</a>
      </div>

      <button class="btn btn-primary w-100 btn-modern" type="submit">Login</button>
    </form>
  </div>
</section>
