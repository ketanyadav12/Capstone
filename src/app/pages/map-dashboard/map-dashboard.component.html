<section class="h-100 d-flex flex-column">
  <h4 class="section-title mb-3">Village Map</h4>
  <div class="row g-3 flex-grow-1">
    <div class="col-md-4 col-lg-3">
      <div class="modern-card p-3 h-100 d-flex flex-column">
        <h6 class="mb-3">Villages</h6>
        <!-- Simple list -->
        <ul class="list-group list-group-flush flex-grow-1 overflow-auto">
          <li class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
              *ngFor="let village of villages"
              (click)="focusVillage(village)"
              style="cursor: pointer;">
            <div>
              <strong>{{ village.name }}</strong><br>
              <small class="text-muted">Water: {{ village.water }}%</small>
            </div>
            <span class="badge bg-primary rounded-pill">{{ ((village.employment + village.water + village.literacy) / 3) | number:'1.0-0' }}</span>
          </li>
        </ul>
      </div>
    </div>
    <div class="col-md-8 col-lg-9">
      <div class="modern-card p-3 h-100">
        <div id="villageMap" class="map-box" style="height: 60vh; width: 100%; border-radius: 8px;"></div>
      </div>
    </div>
  </div>
</section>
