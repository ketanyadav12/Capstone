<div class="app-layout">
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-brand">
      <i class="fa-solid fa-city me-2"></i>
      {{ 'APP.BRAND' | t }}
    </div>

    <nav class="sidebar-nav">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.link"
          routerLinkActive="active"
          class="nav-link-item"
          (click)="closeSidebarOnMobile()"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.label | t }}</span>
        </a>
    </nav>
  </aside>

  <div class="content-wrapper">
    <header class="top-navbar modern-card">
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-sm btn-outline-primary d-lg-none" (click)="toggleSidebar()">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h5 class="mb-0 section-title"><i class="fa-solid fa-layer-group text-primary me-2"></i>{{ 'APP.TITLE' | t }}</h5>
      </div>

      <div class="d-flex align-items-center gap-3">
        <div class="d-flex align-items-center gap-2">
          <label for="langSelect" class="small mb-0">{{ 'HEADER.LANGUAGE' | t }}</label>
          <select id="langSelect" class="form-select form-select-sm" name="selectedLanguage" [(ngModel)]="selectedLanguage" (change)="changeLanguage()">
            <option *ngFor="let lang of languages" [value]="lang.code">{{ lang.label }}</option>
          </select>
        </div>

        <button class="icon-btn" aria-label="Notifications">
          <i class="fa-regular fa-bell"></i>
        </button>

        <button class="btn btn-sm btn-modern btn-outline-success" (click)="toggleTheme()">
          <i class="fa-solid" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
          {{ isDarkMode ? ('HEADER.LIGHT' | t) : ('HEADER.DARK' | t) }}
        </button>

        <div class="user-pill">
          <i class="fa-solid fa-user"></i>
          <span>{{ currentRoleLabel === 'Admin' ? ('ROLE.ADMIN' | t) : ('ROLE.USER' | t) }}</span>
        </div>

        <button class="btn btn-sm btn-outline-danger btn-modern" (click)="logout()">
          <i class="fa-solid fa-right-from-bracket me-1"></i>{{ 'HEADER.LOGOUT' | t }}
        </button>
      </div>
    </header>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
